// Job pipeline stage detection for Kanban view
function getJobStage(task) {
  const name = (task.name || '').toLowerCase();
  const detail = (task.detail || '').toLowerCase();
  if (task.status === STATUS.BLOCKED || task.status === STATUS.ON_HOLD) return 'Blocked';
  if (task.status === STATUS.COMPLETE) {
    if (name.includes('rejected') || detail.includes('rejected') || detail.includes('moved forward with')) return 'Rejected';
    return null;
  }
  if (task.status === STATUS.NOT_STARTED) {
    const jobKeywords = ['vp', 'svp', 'sr director', 'director', 'apply via', 'greenhouse', 'workday'];
    return jobKeywords.some(k => name.includes(k) || detail.includes(k)) ? 'Sourced' : null;
  }
  if (task.status === STATUS.IN_PROGRESS) {
    if (name.includes('interview') || detail.includes('interview')) return 'Interview';
    if (detail.includes('awaiting scheduling') || detail.includes('scheduling') || detail.includes('next round') || detail.includes('phone screen')) return 'Screening';
    if (detail.includes('verify') && detail.includes('apply')) return 'Sourced';
    if (detail.includes('applied') || detail.includes('application submitted')) return 'Applied';
    return 'Applied';
  }
  return null;
}

// Staleness detection
function getDaysSinceModified(lastModified) {
  if (!lastModified) return 0;
  const modified = new Date(lastModified + 'T00:00:00');
  const now = new Date();
  return Math.floor((now - modified) / (1000 * 60 * 60 * 24));
}

function getStalenessWarning(task) {
  if (task.status !== STATUS.IN_PROGRESS) return null;
  const days = getDaysSinceModified(task.lastModified);
  if (days >= 14) return { label: `STALE (${days}d)`, color: COLORS.red, level: 'critical' };
  if (days >= 7) return { label: `STALE (${days}d)`, color: COLORS.orange, level: 'warning' };
  return null;
}

// Agent timestamp formatting
function formatAgentUpdate(isoString) {
  if (!isoString) return 'Never';
  try {
    const d = new Date(isoString);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' at ' +
      d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  } catch (e) { return 'Unknown'; }
}

// JSON export
function exportDashboardJSON(workstreams) {
  const data = {
    exported: new Date().toISOString(),
    version: 'michelles-life-tracker-v2',
    workstreams,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `life-tracker-export-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

const matchesFilter = (task, filter) => {
  if (filter === 'all') return true;
  if (filter === 'active') return task.status === STATUS.IN_PROGRESS;
  if (filter === 'done') return task.status === STATUS.COMPLETE;
  if (filter === 'todo') return task.status === STATUS.NOT_STARTED;
  if (filter === 'blocked') return task.status === STATUS.BLOCKED || task.status === STATUS.ON_HOLD;
  return true;
};

const matchesSearch = (task, search) => {
  if (!search) return true;
  const q = search.toLowerCase();
  return task.name.toLowerCase().includes(q) || task.detail.toLowerCase().includes(q);

const STORAGE_KEY = 'michelles-life-tracker-v5';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch (e) {}
  return null;
}

function saveState(workstreams) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(workstreams));
  } catch (e) {}
}

function genId() {
  return 'task-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
}

function today() {
  return new Date().toISOString().split('T')[0];
}

function calcProgress(tasks) {
  if (!tasks.length) return 0;
  const done = tasks.filter(t => t.status === STATUS.COMPLETE).length;
  return Math.round((done / tasks.length) * 100);
}

function ProgressBar({ progress, color, height = 10 }) {
  return (
    <div style={{ width: '100%', background: COLORS.midGray, borderRadius: height / 2, overflow: 'hidden', height }}>
      <div style={{
        width: `${Math.min(progress, 100)}%`,
        height: '100%',
        background: color,
        borderRadius: height / 2,
        transition: 'width 0.6s ease',
      }} />
    </div>
  );
}

function StatusBadge({ status, onClick }) {
  return (
    <span
      className={onClick ? 'status-badge-click' : ''}
      onClick={onClick}
      title={onClick ? 'Click to change status' : ''}
      style={{
        display: 'inline-flex',
        alignItems: 'center',
        gap: 4,
        padding: '3px 10px',
        borderRadius: 20,
        fontSize: 11,
        fontWeight: 600,
        fontFamily: "'Inter', sans-serif",
        background: statusColor(status) + '20',
        color: statusColor(status),
        whiteSpace: 'nowrap',
      }}>
      {statusEmoji(status)} {status}
    </span>
  );
}

function MiniStat({ label, value, color, onClick, active }) {
  return (
    <div
      className="mini-stat"
      onClick={onClick}
      style={{
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        padding: '12px 16px',
        background: active ? color + '25' : color + '12',
        borderRadius: 12,
        minWidth: 90,
        cursor: onClick ? 'pointer' : 'default',
        border: active ? '2px solid ' + color : '2px solid transparent',
        transition: 'all 0.2s ease',
        transform: active ? 'scale(1.04)' : 'scale(1)',
      }}>
      <span className="mini-stat-value" style={{ fontSize: 26, fontWeight: 800, fontFamily: "'Montserrat', sans-serif", color }}>{value}</span>
      <span className="mini-stat-label" style={{ fontSize: 10, fontWeight: 600, fontFamily: "'Inter', sans-serif", color: COLORS.dark, textTransform: 'uppercase', letterSpacing: 0.5, marginTop: 2 }}>{label}</span>
    </div>
  );
}

function daysUntil(dateStr) {
  const target = new Date(dateStr + 'T00:00:00');
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  return Math.ceil((target - now) / (1000 * 60 * 60 * 24));
}

function TopActions({ workstreams }) {
  const actions = [];
  workstreams.forEach(ws => {
    ws.tasks.forEach(t => {
      if (t.status === STATUS.BLOCKED) {
        actions.push({ ...t, wsName: ws.name, wsIcon: ws.icon, wsColor: ws.color, priority: 1 });
      }
    });
  });
  // Also surface oldest in-progress tasks
  workstreams.forEach(ws => {
    ws.tasks.forEach(t => {
      if (t.status === STATUS.IN_PROGRESS) {
        actions.push({ ...t, wsName: ws.name, wsIcon: ws.icon, wsColor: ws.color, priority: 2 });
      }
    });
  });
  actions.sort((a, b) => {
    if (a.priority !== b.priority) return a.priority - b.priority;
    return (a.lastModified || '').localeCompare(b.lastModified || '');
  });
  const top = actions.slice(0, 5);
  if (!top.length) return null;
  return (
    <div style={{
      background: COLORS.dark + '05',
      border: '1px solid ' + COLORS.midGray,
      borderRadius: 14,
      padding: '14px 18px',
      marginBottom: 16,
    }}>
      <div style={{ fontFamily: "'Montserrat', sans-serif", fontWeight: 700, fontSize: 13, color: COLORS.dark, marginBottom: 10, display: 'flex', alignItems: 'center', gap: 6 }}>
        {'\u26A1'} Top Actions
      </div>
      {top.map((t, i) => (
        <div key={i} style={{
          display: 'flex',
          alignItems: 'center',
          gap: 8,
          padding: '6px 0',
          borderBottom: i < top.length - 1 ? '1px solid ' + COLORS.midGray : 'none',
        }}>
          <span style={{ fontSize: 11, fontWeight: 700, color: '#fff', background: t.wsColor, padding: '2px 7px', borderRadius: 8, fontFamily: "'Inter', sans-serif", whiteSpace: 'nowrap' }}>{t.wsIcon} {t.wsName}</span>
          <span style={{ fontFamily: "'Inter', sans-serif", fontSize: 12, fontWeight: 600, color: COLORS.dark, flex: 1 }}>{t.name}</span>
          <span style={{
            fontSize: 10, fontWeight: 700, fontFamily: "'Inter', sans-serif",
            padding: '2px 8px', borderRadius: 10,
            background: (t.status === STATUS.BLOCKED ? COLORS.red : COLORS.blue) + '20',

            whiteSpace: 'nowrap',
          }}>{t.status === STATUS.BLOCKED ? 'BLOCKED' : 'ACTIVE'}</span>
        </div>
      ))}
    </div>
  );
}

function NeedsAttention({ workstreams }) {
  const items = [];
  workstreams.forEach(ws => {
    ws.tasks.forEach(t => {
      if (t.status === STATUS.BLOCKED) {
        items.push({ ...t, workstream: ws.name, wsIcon: ws.icon, reason: 'BLOCKED', priority: 1 });
      }
      const staleness = getStalenessWarning(t);
      if (staleness && staleness.level === 'critical') {
        items.push({ ...t, workstream: ws.name, wsIcon: ws.icon, reason: staleness.label, priority: 2 });

function AddTaskRow({ onAdd }) {
  const [show, setShow] = useState(false);
  const [name, setName] = useState('');
  const [detail, setDetail] = useState('');
  const inputRef = useRef(null);

  useEffect(() => {
    if (show && inputRef.current) inputRef.current.focus();
  }, [show]);

  if (!show) {
    return (
      <button
        onClick={() => setShow(true)}
        style={{
          width: '100%',
          padding: '8px',
          borderRadius: 10,
          background: COLORS.lightGray,
          color: '#aaa',
          fontFamily: "'Inter', sans-serif",
          fontSize: 12,
          fontWeight: 600,
          marginTop: 8,
          transition: 'all 0.2s',
        }}
      >
        + Add Task
      </button>
    );
  }

  const handleAdd = () => {
    if (name.trim()) {
      onAdd(name.trim(), detail.trim());
      setName('');
      setDetail('');
      setShow(false);
    }
  };

  return (
    <div className="add-task-row" style={{ display: 'flex', gap: 8, marginTop: 8, alignItems: 'center' }}>
      <input
        ref={inputRef}
        value={name}
        onChange={e => setName(e.target.value)}
        onKeyDown={e => e.key === 'Enter' && handleAdd()}
        placeholder="Task name"
        style={{
          flex: 2,
          padding: '8px 12px',
          borderRadius: 8,
          border: '1px solid ' + COLORS.midGray,
          fontFamily: "'Inter', sans-serif",
          fontSize: 12,
        }}
      />
      <input
        value={detail}
        onChange={e => setDetail(e.target.value)}
        onKeyDown={e => e.key === 'Enter' && handleAdd()}
        placeholder="Detail (optional)"
        style={{
          flex: 3,
          padding: '8px 12px',
          borderRadius: 8,
          border: '1px solid ' + COLORS.midGray,
          fontFamily: "'Inter', sans-serif",
          fontSize: 12,
        }}
      />
      <button onClick={handleAdd} style={{
        padding: '8px 16px',
        borderRadius: 8,
        background: COLORS.blue,
        color: '#fff',
        fontFamily: "'Inter', sans-serif",
        fontSize: 12,
        fontWeight: 600,
      }}>Add</button>
      <button onClick={() => { setShow(false); setName(''); setDetail(''); }} style={{
        padding: '8px 12px',
        borderRadius: 8,
        background: COLORS.lightGray,
        color: '#888',
        fontFamily: "'Inter', sans-serif",
        fontSize: 12,
      }}>Cancel</button>
    </div>
  );
}

function WorkstreamCard({ ws, isExpanded, onToggle, taskFilter, searchQuery, onStatusChange, onAddTask, kanbanMode, onToggleKanban }) {
  const completedCount = ws.tasks.filter(t => t.status === STATUS.COMPLETE).length;
  const inProgressCount = ws.tasks.filter(t => t.status === STATUS.IN_PROGRESS).length;
  const notStartedCount = ws.tasks.filter(t => t.status === STATUS.NOT_STARTED).length;
  const blockedCount = ws.tasks.filter(t => t.status === STATUS.BLOCKED || t.status === STATUS.ON_HOLD).length;
  const visibleTasks = ws.tasks.filter(t => matchesFilter(t, taskFilter) && matchesSearch(t, searchQuery));
  const progress = calcProgress(ws.tasks);

  return (
    <div style={{
      background: '#fff',
      borderRadius: 16,
      border: '1px solid ' + COLORS.midGray,
      overflow: 'hidden',
      boxShadow: isExpanded ? '0 4px 24px rgba(0,0,0,0.08)' : '0 1px 4px rgba(0,0,0,0.04)',
      transition: 'box-shadow 0.3s ease',
    }}>
      <div
        className="ws-header"
        onClick={onToggle}
        style={{
          padding: '18px 20px',
          cursor: 'pointer',
          display: 'flex',
          alignItems: 'center',
          gap: 14,
          borderBottom: isExpanded ? '1px solid ' + COLORS.midGray : 'none',
        }}
      >
        <span className="ws-icon" style={{ fontSize: 28 }}>{ws.icon}</span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4, flexWrap: 'wrap' }}>
            <span className="ws-name" style={{ fontFamily: "'Montserrat', sans-serif", fontWeight: 700, fontSize: 16, color: COLORS.dark }}>{ws.name}</span>
            <span style={{ fontSize: 11, fontWeight: 700, fontFamily: "'Montserrat', sans-serif", color: ws.color }}>{progress}%</span>
          </div>
          <ProgressBar progress={progress} color={ws.color} height={6} />
          <p style={{ fontSize: 12, color: '#888', margin: '6px 0 0', fontFamily: "'Inter', sans-serif", lineHeight: 1.4 }}>{ws.summary}</p>
        </div>
        <div style={{ display: 'flex', gap: 6, flexShrink: 0, flexWrap: 'wrap', justifyContent: 'flex-end' }}>
          {completedCount > 0 && <span style={{ fontSize: 11, padding: '2px 8px', borderRadius: 10, background: COLORS.green + '20', color: COLORS.green, fontWeight: 600 }}>{completedCount} done</span>}
          {inProgressCount > 0 && <span style={{ fontSize: 11, padding: '2px 8px', borderRadius: 10, background: COLORS.blue + '20', color: COLORS.blue, fontWeight: 600 }}>{inProgressCount} active</span>}
          {(notStartedCount + blockedCount) > 0 && <span style={{ fontSize: 11, padding: '2px 8px', borderRadius: 10, background: '#f0f0f0', color: '#888', fontWeight: 600 }}>{notStartedCount + blockedCount} pending</span>}
        </div>
        <span style={{ fontSize: 18, color: '#ccc', transition: 'transform 0.2s', transform: isExpanded ? 'rotate(180deg)' : 'rotate(0deg)', flexShrink: 0 }}>{'\u25BC'}</span>
      </div>

      {isExpanded && (
        <div className="ws-tasks" style={{ padding: '12px 20px 18px' }}>
          {ws.id === 'job-search' && (
            <div style={{ marginBottom: 12 }}>
              <button
                onClick={e => { e.stopPropagation(); onToggleKanban && onToggleKanban(); }}
                style={{
                  padding: '5px 14px',
                  borderRadius: 20,
                  background: kanbanMode ? COLORS.dark : COLORS.lightGray,
                  color: kanbanMode ? '#fff' : '#888',
                  fontFamily: "'Inter', sans-serif",
                  fontSize: 11,
                  fontWeight: 600,
                  transition: 'all 0.2s',
                }}
              >
                {kanbanMode ? '\u2630 List View' : '\u{1F4CB} Pipeline View'}
              </button>
            </div>
          )}
          {ws.id === 'job-search' && kanbanMode ? (
            <JobKanban tasks={ws.tasks} />
          ) : (
            <>
              {visibleTasks.length === 0 && (
                <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 12, color: '#bbb', textAlign: 'center', padding: 12 }}>No tasks match this filter</p>
              )}
              {visibleTasks.map((task, i) => (
                <div key={task.id} className="task-row" style={{
                  display: 'flex',
                  alignItems: 'flex-start',
                  gap: 12,
                  padding: '10px 0',
                  borderBottom: i < visibleTasks.length - 1 ? '1px solid ' + COLORS.lightGray : 'none',
                }}>
                  <StatusBadge
                    status={task.status}
                    onClick={(e) => {
                      e.stopPropagation();
                      onStatusChange(ws.id, task.id);
                    }}
                  />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                      <span style={{ fontFamily: "'Inter', sans-serif", fontSize: 13, fontWeight: 600, color: COLORS.dark }}>{task.name}</span>
                      {(() => {
                        const stale = getStalenessWarning(task);
                        if (!stale) return null;
                        return <span style={{
                          fontSize: 9, fontWeight: 700, fontFamily: "'Inter', sans-serif",
                          padding: '1px 6px', borderRadius: 8,
                          background: stale.color + '20', color: stale.color,
                        }}>{stale.label}</span>;
                      })()}
                    </div>
                    <p className="task-detail" style={{ fontFamily: "'Inter', sans-serif", fontSize: 12, color: '#999', margin: '3px 0 0', lineHeight: 1.4 }}>{task.detail}</p>
                    {task.lastModified && (
                      <span style={{ fontFamily: "'Inter', sans-serif", fontSize: 10, color: '#ccc', marginTop: 2, display: 'inline-block' }}>Modified: {task.lastModified}</span>
                    )}
                  </div>
                </div>
              ))}
            </>
          )}
          <AddTaskRow onAdd={(name, detail) => onAddTask(ws.id, name, detail)} />
        </div>
      )}
    </div>
  );
}

function LifeTracker() {
  const [workstreams, setWorkstreams] = useState(() => {
    const saved = loadState();
    return saved || DEFAULT_WORKSTREAMS;
  });
  const [expandedIds, setExpandedIds] = useState(new Set(['job-search']));
  const [activeTab, setActiveTab] = useState('career');
  const [kanbanJobSearch, setKanbanJobSearch] = useState(false);

  useEffect(() => {
    saveState(workstreams);
  }, [workstreams]);

  const toggle = (id) => {
    setExpandedIds(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  };

  const cycleStatus = useCallback((wsId, taskId) => {
    setWorkstreams(prev => prev.map(ws => {
      if (ws.id !== wsId) return ws;
      return {
        ...ws,
        tasks: ws.tasks.map(t => {
          if (t.id !== taskId) return t;
          const currentIdx = STATUS_CYCLE.indexOf(t.status);
          const nextIdx = (currentIdx + 1) % STATUS_CYCLE.length;
          return { ...t, status: STATUS_CYCLE[nextIdx], lastModified: today() };
        }),
      };
    }));
  }, []);

  const addTask = useCallback((wsId, name, detail) => {
    setWorkstreams(prev => prev.map(ws => {
      if (ws.id !== wsId) return ws;
      return {
        ...ws,
        tasks: [...ws.tasks, {
          id: genId(),
          name,
          detail: detail || '',
          status: STATUS.NOT_STARTED,
          lastModified: today(),
        }],
      };
    }));
  }, []);

  const resetData = () => {
    if (confirm('Reset all data to defaults? This will clear any saved changes.')) {
      setWorkstreams(DEFAULT_WORKSTREAMS);
      localStorage.removeItem(STORAGE_KEY);
    }
  };

  const totalTasks = workstreams.reduce((sum, ws) => sum + ws.tasks.length, 0);
  const completedTasks = workstreams.reduce((sum, ws) => sum + ws.tasks.filter(t => t.status === STATUS.COMPLETE).length, 0);
  const inProgressTasks = workstreams.reduce((sum, ws) => sum + ws.tasks.filter(t => t.status === STATUS.IN_PROGRESS).length, 0);
  const notStartedTasks = workstreams.reduce((sum, ws) => sum + ws.tasks.filter(t => t.status === STATUS.NOT_STARTED).length, 0);
  const blockedTasks = workstreams.reduce((sum, ws) => sum + ws.tasks.filter(t => t.status === STATUS.BLOCKED || t.status === STATUS.ON_HOLD).length, 0);
  const overallProgress = totalTasks ? Math.round((completedTasks / totalTasks) * 100) : 0;

  const tabWsIds = TAB_WS[activeTab] || [];
  const tabWs = workstreams.filter(ws => tabWsIds.includes(ws.id));
  const tabAgents = TAB_AGENTS[activeTab] || [];
  const tabDecisions = DECISION_QUEUE.filter(d => tabAgents.includes(d.agent));

  const renderWorkstreams = (wsItems) => (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      {wsItems.map(ws => (
        <WorkstreamCard
          key={ws.id}
          ws={ws}
          isExpanded={expandedIds.has(ws.id)}
          onToggle={() => toggle(ws.id)}
          taskFilter="all"
          searchQuery=""
          onStatusChange={cycleStatus}
          onAddTask={addTask}
          kanbanMode={ws.id === 'job-search' && kanbanJobSearch}
          onToggleKanban={ws.id === 'job-search' ? () => setKanbanJobSearch(prev => !prev) : undefined}
        />
      ))}
    </div>
  );

  return (
    <div style={{
      fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, sans-serif",
      background: COLORS.white,
      minHeight: '100vh',
      padding: '24px 20px',
      maxWidth: 900,
      margin: '0 auto',
    }}>

      {/* Header */}
      <div className="shelzy-header">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 10 }}>
          <div>
            <div className="shelzy-brand-mark">Shelzy's Designs</div>
            <h1 className="header-title" style={{ fontFamily: "'Montserrat', sans-serif", fontWeight: 800, fontSize: 26, color: COLORS.dark, margin: 0, letterSpacing: -0.5 }}>
              Life OS
            </h1>
            <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 13, color: '#999', margin: '4px 0 0' }}>
              {new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}
            </p>
            <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 10, color: '#bbb', margin: '2px 0 0' }}>
              Last sync: {formatAgentUpdate(LAST_AGENT_UPDATE)}
            </p>
          </div>
          <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
            <button onClick={() => exportDashboardJSON(workstreams)} style={{ padding: '6px 14px', borderRadius: 8, background: '#f5f5f7', color: '#888', fontFamily: "'Inter', sans-serif", fontSize: 10, fontWeight: 600 }}>Export</button>
            <button onClick={resetData} style={{ padding: '6px 14px', borderRadius: 8, background: '#f5f5f7', color: '#aaa', fontFamily: "'Inter', sans-serif", fontSize: 10, fontWeight: 600 }}>Reset</button>
          </div>
        </div>
      </div>

      {/* Mini stats */}
      <div className="mini-stats-row" style={{ display: 'flex', gap: 10, marginBottom: 16, flexWrap: 'wrap', alignItems: 'center' }}>
        <MiniStat label="Total" value={totalTasks} color={COLORS.dark} />
        <MiniStat label="Done" value={completedTasks} color={COLORS.green} />
        <MiniStat label="Active" value={inProgressTasks} color={COLORS.blue} />
        <MiniStat label="Queued" value={notStartedTasks} color={COLORS.orange} />
        <MiniStat label="Blocked" value={blockedTasks} color={COLORS.red} />
        <div style={{ flex: 1, minWidth: 140, display: 'flex', alignItems: 'center' }}>
          <div style={{ width: '100%' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
              <span style={{ fontFamily: "'Inter', sans-serif", fontSize: 10, fontWeight: 600, color: '#aaa', textTransform: 'uppercase', letterSpacing: 0.5 }}>Overall</span>
              <span style={{ fontFamily: "'Montserrat', sans-serif", fontWeight: 800, fontSize: 13, color: COLORS.pink }}>{overallProgress}%</span>
            </div>
            <ProgressBar progress={overallProgress} color={COLORS.pink} height={7} />
          </div>

      </div>

      {/* Agent status -- always visible */}
      <AgentStatusGrid />

      {/* Tab navigation */}

      {/* Tab content */}
      <div style={{ paddingTop: 4 }}>

        {activeTab === 'career' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            {tabDecisions.length > 0 && <DecisionQueue items={tabDecisions} />}

            <EtsyRevenueTicker />
            {tabDecisions.length > 0 && <DecisionQueue items={tabDecisions} />}
            {renderWorkstreams(tabWs)}
          </div>
        )}

        {activeTab === 'affiliate' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <AffiliateSitesPanel />
            {tabDecisions.length > 0 && <DecisionQueue items={tabDecisions} />}
            {renderWorkstreams(tabWs)}
          </div>
        )}

        {activeTab === 'finance' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            {tabDecisions.length > 0 && <DecisionQueue items={tabDecisions} />}
            {renderWorkstreams(tabWs)}
          </div>
        )}

        {activeTab === 'fertility' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            {renderWorkstreams(tabWs)}
          </div>
        )}

        {activeTab === 'gmail' && <GmailPanel />}

        {activeTab === 'todo' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <TopActions workstreams={tabWs} />
            <NeedsAttention workstreams={tabWs} />
            <RecentlyCompleted workstreams={workstreams} />
            {renderWorkstreams(tabWs)}
          </div>
        )}

      </div>

      <div style={{ textAlign: 'center', padding: '32px 0 12px' }}>
        <div style={{ display: 'inline-block', background: '#eee', height: 1, width: 60, borderRadius: 1, marginBottom: 12 }} />
        <div style={{ fontSize: 9, fontWeight: 600, fontFamily: "'Montserrat', sans-serif", letterSpacing: 2, textTransform: 'uppercase', color: '#ccc' }}>
          Shelzy's Designs
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LifeTracker />);
</script>
</body>
</html>
