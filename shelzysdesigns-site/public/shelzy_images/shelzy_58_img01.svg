  <!-- Main bottle -->
  <rect x="820" y="330" width="360" height="65" rx="20" fill="#2d2d2d"/>
  <rect x="800" y="385" width="400" height="880" rx="70" fill="#8adbde"/>
  <rect x="835" y="420" width="330" height="810" rx="60" fill="#a8e6e9"/>
  <rect x="865" y="440" width="80" height="770" rx="40" fill="white" opacity="0.22"/>
  <!-- Fun stars decoration -->
  <text x="870" y="530" font-family="Arial, sans-serif" font-size="50" fill="#fb5887">★</text>
  <text x="1080" y="530" font-family="Arial, sans-serif" font-size="50" fill="#fe8c43">★</text>
  <text x="975" y="560" font-family="Arial, sans-serif" font-size="40" fill="#fb5887">★</text>
